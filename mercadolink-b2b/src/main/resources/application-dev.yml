spring:
  datasource:
    url: jdbc:h2:file:./data/mercadolink-dev;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
logging:
  level:
    root: "INFO"
    '[pe.aspropa.mercadolink]': "DEBUG"
app:
  izipay:
    sandbox-mode: true