spring:
  datasource:
    url: jdbc:h2:file:./data/mercadolink;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: false
logging:
  level:
    root: "INFO"
    '[pe.aspropa.mercadolink]': "DEBUG"
app:
  izipay:
    sandbox-mode: true
  culqi:
    public-key: "pk_test_demo_culqi_public"
    secret-key: "sk_test_demo_culqi_secret"
    api-key: "sk_test_demo_culqi_api_key"
    enabled: true
    real-mode: false