<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title th:text="${rol == T(pe.aspropa.mercadolink.domain.Rol).PROVEEDOR} ? 'Proveedor' : 'Vendedor'">MercadoLink B2B</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    :root {
      --bg: #2d1e14;
      --surface: #3a281a;
      --surface2: #4a3422;
      --border: #8b6d47;
      --text: #f0e6d2;
      --muted: #c9b494;
      --accent: #d4a35e;
      --accent2: #b47a4a;
      --green: #7cae5f;
      --yellow: #e8c15e;
      --red: #c96a5a;
      --wood: #5d462d;
      --radius: 10px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: 
        radial-gradient(ellipse at 20% 30%, rgba(139,109,71,0.4), transparent 50%),
        radial-gradient(ellipse at 80% 70%, rgba(180,122,74,0.3), transparent 60%),
        var(--bg);
      color: var(--text);
      font-family: 'Georgia', 'Times New Roman', serif;
      margin: 0;
      padding: 2rem;
      min-height: 100vh;
      line-height: 1.6;
    }
    .container { max-width: 600px; margin: 0 auto; }
    .top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
    h1 { 
      font-size: 1.8rem; 
      color: var(--accent);
      text-shadow: 2px 2px 0 rgba(0,0,0,0.3);
    }
    .card {
      background: rgba(74,52,34,0.6);
      border: 3px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }
    .form-group { margin-bottom: 1.2rem; }
    label { 
      display: block; 
      color: var(--muted); 
      margin-bottom: 0.4rem; 
      font-size: 0.95rem; 
      font-weight: 600;
    }
    input, select {
      width: 100%;
      padding: 0.7rem 1rem;
      background: rgba(61,44,26,0.6);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 1rem;
      transition: border-color .2s;
    }
    input:focus, select:focus { 
      outline: none; 
      border-color: var(--accent); 
      box-shadow: 0 0 0 2px rgba(212,163,94,0.2);
    }
    .actions { display: flex; gap: 0.8rem; margin-top: 1.5rem; }
    button, a.btn {
      padding: 0.7rem 1.4rem;
      border: 2px solid var(--wood);
      border-radius: 999px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: all .3s ease;
      font-size: 0.95rem;
    }
    button[type="submit"] { 
      background: linear-gradient(135deg, var(--green), #9be89f); 
      color: #1a110c;
    }
    button[type="submit"]:hover { 
      transform: translateY(-2px); 
      filter: brightness(1.1);
      box-shadow: 0 4px 15px rgba(124,174,95,0.3);
    }
    a.btn { 
      background: rgba(139,109,71,0.3); 
      color: var(--text);
    }
    a.btn:hover { 
      background: rgba(212,163,94,0.4);
      transform: translateY(-2px);
    }
    .error { 
      color: var(--red); 
      font-size: 0.9rem; 
      margin-top: 0.4rem; 
    }
    .form-icon {
      text-align: center;
      margin-bottom: 1.5rem;
    }
    .form-icon i {
      font-size: 3rem;
      color: var(--accent);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="top">
      <h1 th:text="${actor.id != null} ? (${actor.rol == T(pe.aspropa.mercadolink.domain.Rol).PROVEEDOR} ? 'Editar Proveedor' : 'Editar Vendedor') : (${rol == T(pe.aspropa.mercadolink.domain.Rol).PROVEEDOR} ? 'Nuevo Proveedor' : 'Nuevo Vendedor')">
        <i class="fas fa-user-plus"></i> Nuevo Actor
      </h1>
      <a class="btn" th:href="${rol == T(pe.aspropa.mercadolink.domain.Rol).PROVEEDOR} ? '/proveedores' : '/vendedores'">
        <i class="fas fa-arrow-left"></i> Volver
      </a>
    </div>

    <div class="form-icon">
      <i class="fas fa-user" th:if="${rol == T(pe.aspropa.mercadolink.domain.Rol).PROVEEDOR} ? 'far fa-truck' : 'fas fa-store'"></i>
    </div>

    <form th:action="@{/actores/guardar}" method="post" th:object="${actor}">
      <input type="hidden" th:field="*{id}" />
      <input type="hidden" th:field="*{rol}" />
      
      <div class="form-group">
        <label for="nombreComercial">Nombre Comercial</label>
        <input type="text" id="nombreComercial" th:field="*{nombreComercial}" required placeholder="Nombre del comerciante o negocio" />
      </div>

      <div class="form-group">
        <label for="email">Email de Contacto</label>
        <input type="email" id="email" th:field="*{email}" required placeholder="correo@ejemplo.com" />
      </div>

      <div class="form-group">
        <label for="documento">Documento de Identidad</label>
        <input type="text" id="documento" th:field="*{documento}" required placeholder="DNI/RUC del negocio" />
      </div>

      <div class="form-group">
        <label for="passwordHash">Contraseña</label>
        <input type="password" id="passwordHash" th:field="*{passwordHash}" th:placeholder="${actor.id != null} ? 'Nueva contraseña (opcional)' : 'Contraseña segura'" />
      </div>

      <div class="form-group" th:if="${puestos != null and !puestos.empty}">
        <label for="puesto">Puesto Asignado</label>
        <select id="puesto" name="puestoId">
          <option value="">-- Sin puesto asignado --</option>
          <option th:each="p : ${puestos}" th:value="${p.id}" th:text="${p.nombre + ' - Sección ' + p.seccion + ' (Puesto ' + p.numero + ')'}" th:selected="${actor.puesto != null and actor.puesto.id == p.id}">Puesto</option>
        </select>
      </div>

      <div class="actions">
        <button type="submit"><i class="fas fa-save"></i> Guardar Registro</button>
        <a class="btn" th:href="${rol == T(pe.aspropa.mercadolink.domain.Rol).PROVEEDOR} ? '/proveedores' : '/vendedores'">
          <i class="fas fa-times"></i> Cancelar
        </a>
      </div>
    </form>
  </div>
</body>
</html>
