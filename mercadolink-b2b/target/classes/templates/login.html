<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Login — MercadoLink B2B</title>
  <style>
  :root {
    --bg: #0d1117; --surface: #161b22; --border: #30363d;
    --text: #e6edf3; --muted: #8b949e; --accent: #388bfd; --green: #3fb950; --radius: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: linear-gradient(120deg, var(--bg) 0%, #161b22 50%, var(--bg) 100%);
    background-size: 200% 200%; animation: gradientShift 6s ease infinite;
    color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; padding: 2rem; min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
  }
  @keyframes gradientShift { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
  .login-card {
    background: rgba(22,27,34,0.7); backdrop-filter: blur(10px);
    border: 1px solid var(--border); border-radius: var(--radius);
    padding: 2rem; max-width: 400px; width: 100%;
    box-shadow: 0 8px 32px rgba(0,0,0,0.2);
  }
  h1 { text-align: center; margin-bottom: 1.5rem; color: var(--accent); font-size: 1.8rem; }
  .form-group { margin-bottom: 1rem; }
  label { display: block; color: var(--muted); margin-bottom: 0.3rem; font-size: 0.9rem; font-weight: 600; }
  input {
    width: 100%; padding: 0.7rem; background: var(--surface);
    border: 1px solid var(--border); border-radius: var(--radius);
    color: var(--text); font-size: 1rem;
  }
  input:focus { outline: none; border-color: var(--accent); }
  button {
    width: 100%; padding: 0.8rem; background: var(--green); color: #fff;
    border: none; border-radius: var(--radius); font-weight: 600; cursor: pointer;
    transition: background 0.2s, transform 0.2s; margin-top: 0.5rem;
  }
  button:hover { background: #51d664; transform: translateY(-2px); }
  .demo-creds { margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid var(--border); font-size: 0.85rem; }
  .demo-creds h4 { color: var(--muted); margin-bottom: 0.5rem; }
  .demo-creds code { background: var(--surface); padding: 0.2rem 0.4rem; border-radius: 4px; color: var(--green); }
  a.btn { display: inline-block; margin-top: 1rem; color: var(--accent); text-decoration: none; }
  .error { color: var(--red); text-align: center; margin-bottom: 1rem; display: none; }
  </style>
</head>
<body>
  <div class="login-card">
    <h1>Login</h1>
    <form id="loginForm">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="usuario@ejemplo.com" required />
      </div>
      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" placeholder="password123" required />
      </div>
      <button type="submit">Entrar</button>
      <div class="error" id="errorMsg">Credenciales inválidas. Verifica email y contraseña.</div>
    </form>

    <div class="demo-creds">
      <h4>Credenciales demo:</h4>
      <p><code>admin@aspropa.pe</code> / <code>password123</code> (ADMIN)</p>
      <p><code>proveedor@aspropa.pe</code> / <code>password123</code> (PROV)</p>
      <p><code>vendedor@aspropa.pe</code> / <code>password123</code> (VEND)</p>
    </div>

    <a class="btn" href="/">Volver al inicio</a>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      try {
        const res = await fetch('/api/v1/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        if (res.ok) {
          const data = await res.json();
          localStorage.setItem('token', data.token);
          window.location.href = '/actores';
        } else {
          document.getElementById('errorMsg').style.display = 'block';
        }
      } catch (err) {
        document.getElementById('errorMsg').style.display = 'block';
      }
    });
  </script>
</body>
</html>
